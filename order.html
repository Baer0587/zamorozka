<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — ЗаморозЪка</title>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Cabin:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Amatic SC"', 'cursive'],
            body:    ['Cabin', 'sans-serif'],
          },
          colors: {
            cream: { 50:'#FEFCF8', 100:'#FAF7F0', 200:'#F5EDD8', 300:'#EDE0C4', 400:'#D4B896' },
            terra: { 300:'#E8845C', 400:'#E07044', 500:'#C85E32', 600:'#A84D28', 700:'#8B3D1E' },
            bark:  { 100:'#D4B896', 200:'#BA9A82', 300:'#9A7A62', 400:'#7A5A42', 500:'#5C3D28', 600:'#3D2B1F' },
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Cabin', sans-serif; background-color: #FAF7F0; color: #3D2B1F; }

    .shadow-warm    { box-shadow: 0 4px 16px rgba(200,94,50,.12), 0 1px 4px rgba(61,43,31,.07); }
    .shadow-warm-md { box-shadow: 0 8px 32px rgba(200,94,50,.16), 0 2px 8px rgba(61,43,31,.09); }

    .btn-primary {
      background: #C85E32; color: #FEFCF8;
      transition: background-color 0.2s ease, transform 0.15s ease;
      cursor: pointer;
    }
    .btn-primary:hover  { background: #A84D28; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:focus-visible { outline: 3px solid #C85E32; outline-offset: 3px; }

    .field {
      width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
      border: 1px solid #EDE0C4; background: #FAF7F0;
      color: #3D2B1F; font-size: 0.875rem; font-family: 'Cabin', sans-serif;
      transition: border-color 0.2s ease;
    }
    .field::placeholder { color: #D4B896; }
    .field:focus { outline: none; border-color: #C85E32; box-shadow: 0 0 0 3px rgba(200,94,50,.15); }
    .field.error { border-color: #C85E32; box-shadow: 0 0 0 3px rgba(200,94,50,.15); }

    .radio-card {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 1rem 0.75rem; border-radius: 0.875rem; cursor: pointer;
      border: 2px solid #EDE0C4; background: #FAF7F0;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }
    .radio-card:has(input:checked) { border-color: #C85E32; background: #FEF5EF; }
    .radio-card input { position: absolute; opacity: 0; width: 0; height: 0; }

    a:focus-visible, button:focus-visible {
      outline: 3px solid #C85E32; outline-offset: 3px; border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen">

<!-- ── Шапка ── -->
<header class="sticky top-0 z-20 bg-cream-100/95 backdrop-blur-sm"
        style="border-bottom:1px solid #EDE0C4; box-shadow:0 2px 16px rgba(61,43,31,.07);">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">

    <!-- Логотип -->
    <a href="index.html" class="flex items-center gap-2 rounded-lg p-1 shrink-0"
       aria-label="ЗаморозЪка — на главную">
      <svg class="w-7 h-7 shrink-0" style="color:#C85E32;" viewBox="0 0 32 32" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <ellipse cx="16" cy="15" rx="11" ry="7" fill="currentColor" opacity="0.15"/>
        <path d="M5 15C5 9.48 10.03 5 16 5C21.97 5 27 9.48 27 15C27 18.8 24.5 22.1 20.8 23.6L22 28L17.2 25.5C16.8 25.65 16.4 25.73 16 25.73C10.03 25.73 5 21.25 5 15Z"
              fill="currentColor" opacity="0.18" stroke="currentColor" stroke-width="1.2"/>
        <path d="M10 13.5C11 11.5 13.2 10.3 16 10.3C18.8 10.3 21 11.5 22 13.5"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M10 16.5C11.5 18.5 13.5 19.5 16 19.5C18.5 19.5 20.5 18.5 22 16.5"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="font-display text-2xl font-bold leading-none" style="color:#C85E32;">ЗаморозЪка</span>
    </a>

    <!-- Назад -->
    <a href="index.html"
       class="flex items-center gap-1.5 text-sm font-semibold rounded-xl px-4 py-2
              transition-colors duration-200"
       style="color:#7A5A42; background:#EDE0C4;"
       onmouseover="this.style.background='#D4B896'"
       onmouseout="this.style.background='#EDE0C4'">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Вернуться в меню
    </a>

  </div>
</header>


<!-- ── Основной контент ── -->
<main class="max-w-4xl mx-auto px-4 sm:px-6 py-10 md:py-14">

  <h1 class="font-display font-bold text-bark-600 mb-8"
      style="font-size:clamp(2.8rem,6vw,4rem);">Оформление заказа</h1>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 lg:gap-8 items-start">

    <!-- ── Состав заказа ── -->
    <div class="lg:col-span-2">
      <div class="bg-cream-50 rounded-2xl shadow-warm-md overflow-hidden sticky top-24">

        <div class="px-6 py-4" style="background:#EDE0C4;">
          <h2 class="font-display font-bold text-bark-600" style="font-size:1.7rem;">Ваш заказ</h2>
        </div>

        <!-- Список товаров -->
        <div id="cart-list" class="px-6 py-4 flex flex-col divide-y" style="divide-color:#F5EDD8;"></div>

        <!-- Пустая корзина -->
        <div id="cart-empty" class="hidden px-6 py-10 flex flex-col items-center text-center gap-3">
          <svg class="w-12 h-12" style="color:#D4B896;" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.2" aria-hidden="true">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <p class="font-semibold" style="color:#9A7A62;">Корзина пуста</p>
          <a href="index.html" class="text-sm font-semibold underline" style="color:#C85E32;">
            Перейти в меню
          </a>
        </div>

        <!-- Итог -->
        <div id="cart-total-row"
             class="hidden flex justify-between items-center px-6 py-4"
             style="border-top:2px solid #EDE0C4; background:#FAF7F0;">
          <span class="font-semibold text-sm" style="color:#7A5A42;">Итого:</span>
          <span id="cart-total" class="font-bold text-xl" style="color:#3D2B1F;"></span>
        </div>

      </div>
    </div>

    <!-- ── Форма заказа ── -->
    <div class="lg:col-span-3">
      <div class="bg-cream-50 rounded-2xl shadow-warm-md p-7 md:p-10">

        <form id="order-form" novalidate>
          <div class="flex flex-col gap-5">

            <!-- Имя -->
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wide mb-1.5"
                     style="color:#9A7A62;" for="f-name">Ваше имя *</label>
              <input id="f-name" type="text" required autocomplete="name"
                     placeholder="Как к вам обращаться?"
                     class="field">
            </div>

            <!-- Телефон -->
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wide mb-1.5"
                     style="color:#9A7A62;" for="f-phone">Телефон *</label>
              <input id="f-phone" type="tel" required autocomplete="tel"
                     placeholder="+7 (___) ___-__-__"
                     class="field">
            </div>

            <!-- Адрес -->
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wide mb-1.5"
                     style="color:#9A7A62;" for="f-address">Адрес доставки *</label>
              <input id="f-address" type="text" required autocomplete="street-address"
                     placeholder="Улица, дом, квартира, домофон"
                     class="field">
            </div>

            <!-- Формат доставки -->
            <div>
              <p class="text-xs font-semibold uppercase tracking-wide mb-3"
                 style="color:#9A7A62;">Формат *</p>
              <div class="flex gap-3">

                <label class="radio-card">
                  <input type="radio" name="format" value="горячее" checked>
                  <svg class="w-7 h-7" style="color:#C85E32;" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                  </svg>
                  <span class="text-sm font-semibold" style="color:#3D2B1F;">Горячее</span>
                  <span class="text-xs text-center" style="color:#9A7A62;">Привезём свежеприготовленным</span>
                </label>

                <label class="radio-card">
                  <input type="radio" name="format" value="замороженное">
                  <svg class="w-7 h-7" style="color:#4B9EFF;" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                    <line x1="12" y1="2" x2="12" y2="22"/>
                    <path d="m20 6-8 4-8-4"/>
                    <path d="m20 18-8-4-8 4"/>
                    <path d="m2 12 10 3 10-3"/>
                  </svg>
                  <span class="text-sm font-semibold" style="color:#3D2B1F;">Замороженное</span>
                  <span class="text-xs text-center" style="color:#9A7A62;">Для хранения и готовки дома</span>
                </label>

              </div>
            </div>

            <!-- Дата и время -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wide mb-1.5"
                       style="color:#9A7A62;" for="f-date">Дата получения *</label>
                <input id="f-date" type="date" required class="field">
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wide mb-1.5"
                       style="color:#9A7A62;" for="f-slot">Время получения *</label>
                <select id="f-slot" required class="field" style="cursor:pointer;">
                  <option value="">— выберите —</option>
                  <option value="10:00–12:00">10:00–12:00</option>
                  <option value="12:00–14:00">12:00–14:00</option>
                  <option value="14:00–16:00">14:00–16:00</option>
                  <option value="16:00–18:00">16:00–18:00</option>
                  <option value="18:00–20:00">18:00–20:00</option>
                </select>
              </div>
            </div>

            <!-- Комментарий -->
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wide mb-1.5"
                     style="color:#9A7A62;" for="f-comment">Комментарий</label>
              <textarea id="f-comment" rows="3"
                        placeholder="Дополнительные пожелания, аллергии, особые просьбы..."
                        class="field resize-none"></textarea>
            </div>

          </div>

          <!-- Отправить -->
          <button id="submit-btn" type="submit"
                  class="btn-primary w-full mt-8 py-4 rounded-xl font-semibold text-sm
                         flex items-center justify-center gap-2 disabled:opacity-60">
            Оформить заказ
          </button>

          <!-- Ошибка отправки -->
          <div id="submit-error" class="hidden mt-4 flex items-start gap-3 px-4 py-3 rounded-xl text-sm"
               style="background:#FEF0EC; border:1px solid #F5C4B2; color:#A84D28;" role="alert">
            <svg class="w-5 h-5 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="submit-error-text">Не удалось отправить заказ. Попробуйте ещё раз или напишите нам напрямую.</span>
          </div>

        </form>

        <!-- Экран успеха -->
        <div id="success-screen" class="hidden text-center py-10">
          <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5"
               style="background:rgba(200,94,50,.12);">
            <svg class="w-10 h-10" style="color:#C85E32;" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <h2 class="font-display font-bold text-bark-600 mb-3" style="font-size:3rem;">Готово!</h2>
          <p class="text-bark-400 leading-relaxed mb-6">
            Ваш заказ принят! Наш менеджер свяжется с вами для подтверждения.
          </p>
          <a href="index.html"
             class="btn-primary inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Вернуться в меню
          </a>
        </div>

      </div>
    </div>
  </div>
</main>


<script>
  const CART_KEY = 'zamorozka_cart';

  /* ── Читаем корзину ── */
  let cartItems = [];
  try {
    const raw = localStorage.getItem(CART_KEY);
    if (raw) cartItems = JSON.parse(raw);
    if (!Array.isArray(cartItems)) cartItems = [];
  } catch { cartItems = []; }

  /* ── Рендер состава ── */
  function formatPrice(p) {
    return Number(p).toLocaleString('ru-RU') + ' ₽';
  }

  function renderCart() {
    const list     = document.getElementById('cart-list');
    const empty    = document.getElementById('cart-empty');
    const totalRow = document.getElementById('cart-total-row');
    const totalEl  = document.getElementById('cart-total');

    if (!cartItems.length) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      totalRow.classList.add('hidden');
      return;
    }

    empty.classList.add('hidden');
    totalRow.classList.remove('hidden');

    list.innerHTML = cartItems.map(item => `
      <div class="py-3 flex justify-between items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-sm leading-snug" style="color:#3D2B1F;">${item.name}</div>
          <div class="text-xs mt-0.5" style="color:#9A7A62;">${formatPrice(item.price)} × ${item.qty} шт.</div>
        </div>
        <div class="font-bold text-sm shrink-0" style="color:#C85E32;">${formatPrice(item.price * item.qty)}</div>
      </div>`).join('');

    const total = cartItems.reduce((s, i) => s + i.price * i.qty, 0);
    totalEl.textContent = formatPrice(total);
  }

  renderCart();

  /* ── Минимальная дата = сегодня ── */
  document.getElementById('f-date').min = new Date().toISOString().slice(0, 10);

  /* ── Форма ── */
  function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    const months = ['января','февраля','марта','апреля','мая','июня',
                    'июля','августа','сентября','октября','ноября','декабря'];
    return `${parseInt(d)} ${months[parseInt(m) - 1]} ${y}`;
  }

  document.getElementById('order-form').addEventListener('submit', async e => {
    e.preventDefault();

    const name    = document.getElementById('f-name').value.trim();
    const phone   = document.getElementById('f-phone').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const date    = document.getElementById('f-date').value;
    const slot    = document.getElementById('f-slot').value;
    const format  = document.querySelector('input[name="format"]:checked').value;
    const comment = document.getElementById('f-comment').value.trim();

    /* Валидация */
    let valid = true;
    [['f-name', name], ['f-phone', phone], ['f-address', address], ['f-date', date], ['f-slot', slot]]
      .forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (!val) {
          el.classList.add('error');
          if (valid) { el.focus(); valid = false; }
        } else {
          el.classList.remove('error');
        }
      });
    if (!valid) return;

    const total    = cartItems.reduce((s, i) => s + i.price * i.qty, 0);
    const submitBtn  = document.getElementById('submit-btn');
    const errorBox   = document.getElementById('submit-error');
    const errorText  = document.getElementById('submit-error-text');

    /* Состояние загрузки */
    submitBtn.disabled = true;
    submitBtn.textContent = 'Отправляем…';
    errorBox.classList.add('hidden');

    window.IS_TELEGRAM = Boolean(window.Telegram?.WebApp?.initData);

    try {
      const res = await fetch('https://n8n.baern8n.ru/webhook/zamorozka-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          phone,
          address,
          format,
          delivery_date: date,
          delivery_time: slot,
          comment,
          items: cartItems.map(i => `${i.name} × ${i.qty} шт. = ${i.price * i.qty} ₽`).join('\n'),
          total,
          source: window.IS_TELEGRAM ? 'telegram_mini_app' : 'website',
          telegram_user: window.Telegram?.WebApp?.initDataUnsafe?.user || null,
        }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      localStorage.removeItem(CART_KEY);
      document.getElementById('order-form').style.display = 'none';
      document.getElementById('success-screen').classList.remove('hidden');

    } catch (err) {
      errorText.textContent = err.message.startsWith('HTTP')
        ? `Сервер вернул ошибку (${err.message}). Попробуйте ещё раз или напишите нам напрямую.`
        : 'Не удалось отправить заказ. Проверьте соединение и попробуйте ещё раз.';
      errorBox.classList.remove('hidden');
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      submitBtn.disabled = false;
      submitBtn.textContent = 'Оформить заказ';
    }
  });

  /* Снимаем подсветку ошибки при вводе / выборе */
  document.querySelectorAll('.field').forEach(el => {
    const evt = el.tagName === 'SELECT' ? 'change' : 'input';
    el.addEventListener(evt, () => el.classList.remove('error'));
  });
</script>

<script>
(function() {
  const tg = window.Telegram?.WebApp;
  if (tg?.MainButton) {
    tg.MainButton.hide();
  }
})();
</script>

</body>
</html>
